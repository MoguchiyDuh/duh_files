decoration {
    rounding = 10
    active_opacity = 1 # 0.8
    inactive_opacity = 0.80
    fullscreen_opacity = 1

    blur {
        enabled = yes
        size = 5
        passes = 2
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }

    shadow {
        enabled= true
        ignore_window = true
        range = 4
        offset = 2 2
        render_power = 2
        color = 0x66000000
    }

}



# Blur for wlogout background
layerrule = blur, logout_dialog # wlogout




