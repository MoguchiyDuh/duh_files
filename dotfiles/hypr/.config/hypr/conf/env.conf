# ============================================
# Cursor
# ============================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24

# ============================================
# Qt theming (VLC, qBittorrent, etc.)
# ============================================
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORM,wayland;xcb

# ============================================
# GTK theming (let wallust handle colors)
# ============================================
env = GTK2_RC_FILES,/usr/share/themes/Adwaita-dark/gtk-2.0/gtkrc
env = ADW_DEBUG_COLOR_SCHEME,prefer-dark

# ============================================
# Wayland
# ============================================
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ============================================
# Mozilla/Firefox
# ============================================
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_WEBRENDER,1
env = MOZ_ACCELERATED,1

# ============================================
# NVIDIA (RTX 3060 Ti)
# ============================================
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# NVIDIA Performance (gaming)
env = __GL_YIELD,USLEEP
env = __GL_SHADER_DISK_CACHE,1
env = __GL_SHADER_DISK_CACHE_PATH,/tmp
env = PROTON_ENABLE_NVAPI,1
env = DXVK_ENABLE_NVAPI,1

# ============================================
# Variables
# ============================================
$scripts = ~/.config/hypr/scripts
$scripts_rofi = ~/.config/rofi/scripts
$mainMod = SUPER

# ============================================
# Default apps
# ============================================
$terminal = kitty
$filemanager = nautilus
$browser = com.brave.Browser
$font = FiraCode Nerd Font
