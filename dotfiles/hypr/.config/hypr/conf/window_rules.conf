# ============================================
# Picture-in-Picture
# ============================================
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 25% 25%, title:^(Picture-in-Picture)$
windowrulev2 = center, title:^(Picture-in-Picture)$
windowrulev2 = opaque, title:^(Picture-in-Picture)$

# ============================================
# Discord Popout
# ============================================
windowrulev2 = float, class:^(discord)$, title:^(.*Popout.*|.*Stream.*)$
windowrulev2 = pin, class:^(discord)$, title:^(.*Popout.*|.*Stream.*)$
windowrulev2 = size 25% 25%, class:^(discord)$, title:^(.*Popout.*|.*Stream.*)$
windowrulev2 = center, class:^(discord)$, title:^(.*Popout.*|.*Stream.*)$
windowrulev2 = opaque, class:^(discord)$, title:^(.*Popout.*|.*Stream.*)$

# ============================================
# Idle inhibit - prevent sleep during fullscreen
# ============================================
windowrulev2 = idleinhibit fullscreen, class:^(brave-browser)$
windowrulev2 = idleinhibit fullscreen, class:^(google-chrome)$
windowrulev2 = idleinhibit fullscreen, class:^(firefox)$
windowrulev2 = idleinhibit fullscreen, class:^(vlc)$

# ============================================
# System utilities - centered, floating, opaque
# ============================================
# WiFi Manager
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(nm-connection-editor)$
windowrulev2 = pin, class:^(nm-connection-editor)$
windowrulev2 = opaque, class:^(nm-connection-editor)$

# Bluetooth Manager
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = pin, class:^(blueman-manager)$
windowrulev2 = opaque, class:^(blueman-manager)$

# Sound Manager
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = center, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = pin, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = opaque, class:^(org.pulseaudio.pavucontrol)$

# ============================================
# File dialogs - float, center, opaque
# ============================================
windowrulev2 = float, title:^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$
windowrulev2 = float, title:^(.*)(wants to save|wants to open)$
windowrulev2 = center, title:^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$
windowrulev2 = center, title:^(.*)(wants to save|wants to open)$
windowrulev2 = opaque, title:^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$
windowrulev2 = opaque, title:^(.*)(wants to save|wants to open)$

# ============================================
# Global floating rules (commented)
# ============================================
#windowrulev2 = opaque, floating:1
#windowrulev2 = center, floating:1

# ============================================
# XWayland optimizations
# ============================================
windowrulev2 = noblur, xwayland:1, floating:1
