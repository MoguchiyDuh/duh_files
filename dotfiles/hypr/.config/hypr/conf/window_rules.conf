# ============================================
# Picture-in-Picture
# ============================================
windowrule {
    name = pip-window
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    size = 25% 25%
    center = on
    opaque = on
}

# ============================================
# Discord Popout
# ============================================
windowrule {
    name = discord-popout
    match:class = ^(discord)$
    match:title = ^(.*Popout.*|.*Stream.*)$
    float = on
    pin = on
    size = 25% 25%
    center = on
    opaque = on
}

# ============================================
# System utilities - centered, floating, opaque
# ============================================
# WiFi Manager
windowrule {
    name = wifi-manager
    match:class = ^(nm-connection-editor)$
    float = on
    center = on
    pin = on
    opaque = on
}

# Bluetooth Manager
windowrule {
    name = bluetooth-manager
    match:class = ^(blueman-manager)$
    float = on
    center = on
    pin = on
    opaque = on
}

# Sound Manager
windowrule {
    name = sound-manager
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = on
    center = on
    pin = on
    opaque = on
}

# ============================================
# File dialogs - float, center, opaque
# ============================================
windowrule {
    name = file-dialogs
    match:title = ^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload)(.*)$
    float = on
    center = on
    opaque = on
}

windowrule {
    name = file-dialogs-wants
    match:title = ^(.*)(wants to save|wants to open)$
    float = on
    center = on
    opaque = on
}

