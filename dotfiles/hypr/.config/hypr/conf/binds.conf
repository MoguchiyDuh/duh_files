# ============================================
# Applications
# ============================================
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, nautilus --new-window
bind = $mainMod, B, exec, $browser
bind = CTRL_SHIFT, escape, exec, $terminal btop

# ============================================
# Rofi launchers
# ============================================
bind = $mainMod, R, exec, pkill rofi || $scripts_rofi/spotlight.sh
bind = $mainMod, V, exec, $scripts_rofi/clipboard.sh
bind = $mainMod, X, exec, $scripts_rofi/wallpaper.sh
bind = $mainMod, PERIOD, exec, $scripts_rofi/emoji.sh
bind = $mainMod SHIFT, W, exec, $scripts_rofi/translate.sh

# ============================================
# Screenshots & Tools
# ============================================
bind = $mainMod SHIFT, S, exec, $scripts/screenshot.sh area
bind = , Print, exec, $scripts/screenshot.sh fullscreen
bind = $mainMod SHIFT, T, exec, $scripts_rofi/ocr.sh
bind = $mainMod SHIFT, C, exec, $scripts_rofi/color_picker.sh

# ============================================
# System
# ============================================
bind = $mainMod SHIFT, R, exec, pkill -x waybar; waybar &
bind = CTRL ALT, DELETE, exec, wlogout

# ============================================
# Window management
# ============================================
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bind = $mainMod, T, togglefloating,
bind = $mainMod, I, pin
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, P, pseudo,
bind = $mainMod, O, togglesplit,

# ============================================
# Resize windows (Vim keys + Arrows)
# ============================================
binde = $mainMod CTRL, H, resizeactive, -128 0
binde = $mainMod CTRL, LEFT, resizeactive, -128 0
binde = $mainMod CTRL, L, resizeactive, 128 0
binde = $mainMod CTRL, RIGHT, resizeactive, 128 0
binde = $mainMod CTRL, K, resizeactive, 0 -128
binde = $mainMod CTRL, UP, resizeactive, 0 -128
binde = $mainMod CTRL, J, resizeactive, 0 128
binde = $mainMod CTRL, DOWN, resizeactive, 0 128

# ============================================
# Focus movement (Vim keys + Arrows)
# ============================================
bind = $mainMod, H, movefocus, l
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, UP, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, DOWN, movefocus, d

# ============================================
# Window swapping (Vim keys + Arrows)
# ============================================
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, LEFT, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, RIGHT, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, UP, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, DOWN, swapwindow, d

# ============================================
# Mouse bindings
# ============================================
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ============================================
# Alt-Tab window cycling
# ============================================
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop
binde = SHIFT ALT, Tab, cyclenext, prev
binde = SHIFT ALT, Tab, bringactivetotop
bind = $mainMod, Tab, exec, $scripts_rofi/windows.sh

# ============================================
# Workspace navigation
# ============================================
bind = $mainMod ALT, H, workspace, -1
bind = $mainMod ALT, LEFT, workspace, -1
bind = $mainMod ALT, L, workspace, +1
bind = $mainMod ALT, RIGHT, workspace, +1

# Switch to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ============================================
# Move window to workspace
# ============================================
bind = $mainMod SHIFT ALT, H, movetoworkspace, -1
bind = $mainMod SHIFT ALT, left, movetoworkspace, -1
bind = $mainMod SHIFT ALT, L, movetoworkspace, +1
bind = $mainMod SHIFT ALT, right, movetoworkspace, +1

# Move to specific workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ============================================
# Special workspace (scratchpad)
# ============================================
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspace, special:magic

# ============================================
# Multimedia keys (laptop/desktop)
# ============================================
# Audio
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
