source=~/.config/hypr/colors.conf

# General settings
general {
    disable_loading_bar = false
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

# Background
background {
    monitor =
    path = ~/.cache/current_wallpaper.png
    blur_passes = 3
    blur_size = 5
    noise = 0.01
    brightness = 0.35
}

# Input field
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = $color0
    inner_color = $background
    font_color = $foreground
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = パスワードを入力...
    hide_input = false
    rounding = 15
    check_color = $color10
    fail_color = $color9
    fail_text = 認証失敗!
    fail_timeout = 2000
    fail_transitions = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $color7
    font_size = 20
    font_family = $FONT Bold
    position = 0, 320
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $foreground
    font_size = 90
    font_family = $FONT Bold
    position = 0, 220
    halign = center
    valign = center
}

# User greeting
label {
    monitor =
    text = おかえり、$USER
    color = $color12
    font_size = 18
    font_family = $FONT
    position = 0, -20
    halign = center
    valign = center
}

# Media info
label {
    monitor =
    text = cmd[update:1000] echo "$((~/.config/hypr/scripts/media_info.sh) | head -1)"
    color = $color10
    font_size = 14
    font_family = $FONT
    position = 0, 100
    halign = center
    valign = center
}

# Media progress
label {
    monitor =
    text = cmd[update:1000] echo "$((~/.config/hypr/scripts/media_info.sh) | tail -1)"
    color = $color8
    font_size = 12
    font_family = $FONT
    position = 0, 80
    halign = center
    valign = center
}

# Uptime
label {
    monitor =
    text = cmd[update:60000] echo " $(uptime -p | sed 's/up //')"
    color = $color8
    font_size = 11
    font_family = $FONT
    position = 30, 30
    halign = left
    valign = bottom
}

# Battery (desktop - hide if no battery)
label {
    monitor =
    text = cmd[update:10000] bat=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); [ -n "$bat" ] && echo " $bat%" || echo ""
    color = $color11
    font_size = 11
    font_family = $FONT
    position = -30, 80
    halign = right
    valign = bottom
}

# Keyboard layout
label {
    monitor =
    text = $LAYOUT
    color = $color14
    font_size = 18
    font_family = $FONT
    position = -30, 30
    halign = right
    valign = bottom
}
