# Vim-style tmux configuration

# Set prefix to Ctrl-a (alternative to default Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable vi mode
set -g mode-keys vi
set -g status-keys vi

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (vim-style)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move window left/right
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# Window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Split panes
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Copy mode with vim bindings
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi / command-prompt -i -p "search down" "send-keys -X search-forward-incremental '%%%'"
bind -T copy-mode-vi ? command-prompt -i -p "search up" "send-keys -X search-backward-incremental '%%%'"

# Paste
bind p paste-buffer

# New window
bind c new-window -c "#{pane_current_path}"

# New session
bind C-c new-session

# Kill pane/window/session
bind x kill-pane
bind X kill-window
bind C-x kill-session

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

set -g status-interval 5

# Mouse support
set -g mouse on

# Terminal colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Status bar - Purple theme
set-option -g status-position top
set -g status-bg black
set -g status-fg white
set -g status-left-length 40
set -g status-left "[#S] "
set -g status-right-length 150
set -g status-right "#{prefix_highlight} #(gitmux -cfg ~/.config/tmux/gitmux.conf '#{pane_current_path}')CPU:#{cpu_percentage} RAM:#{ram_percentage} GPU:#{gpu_percentage} | %H:%M %d-%b"

# Pane borders - Purple theme
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=colour62,bold"

# Window list - Purple theme
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "bg=colour62,fg=white,bold"

# Mode colors (copy mode, command prompt)
set -g mode-style "bg=colour99,fg=white"
set -g message-style "bg=colour62,fg=white"
set -g message-command-style "bg=colour99,fg=white"

# tmux-resurrect plugin
run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux

# tmux-continuum plugin (auto-save every 15min)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
run-shell ~/.config/tmux/plugins/tmux-continuum/continuum.tmux

# tmux-cpu plugin
run-shell ~/.config/tmux/plugins/tmux-cpu/cpu.tmux

# tmux-prefix-highlight plugin
set -g @prefix_highlight_fg 'white'
set -g @prefix_highlight_bg 'colour62'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=white,bg=colour99'
set -g @prefix_highlight_prefix_prompt '^A'
set -g @prefix_highlight_copy_prompt 'Copy'
run-shell ~/.config/tmux/plugins/tmux-prefix-highlight/prefix_highlight.tmux
